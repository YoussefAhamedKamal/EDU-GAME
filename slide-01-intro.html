<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 20px;
      background: #0a0a1a;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(16, 185, 129, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }
    .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 1;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(99, 102, 241, 0.6);
      border-radius: 50%;
      animation: float 15s infinite;
    }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 12s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 14s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 16s; }
    .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 13s; }
    .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 15s; }
    .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 17s; }
    .particle:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 14s; }
    .particle:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 12s; }
    .particle:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 16s; }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    .container {
      max-width: 650px;
      animation: fadeIn 1s ease-out;
      position: relative;
      z-index: 10;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .shield-container {
      width: 140px;
      height: 140px;
      margin: 0 auto 30px;
      position: relative;
    }
    .shield-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #3b82f6 50%, #10b981 100%);
      border-radius: 50%;
      animation: shieldPulse 3s infinite;
      filter: blur(20px);
      opacity: 0.5;
    }
    @keyframes shieldPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.3; }
    }
    .shield-icon {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1e1e3f, #2a2a5f);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
    }
    .shield-icon svg {
      width: 70px;
      height: 70px;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #a5b4fc, #6366f1, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .subtitle {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 35px;
      line-height: 1.8;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(16, 185, 129, 0.2));
      border: 2px solid rgba(99, 102, 241, 0.4);
      padding: 14px 35px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .badge:hover {
      transform: scale(1.05);
      border-color: #6366f1;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
    }
    .badge svg {
      width: 24px;
      height: 24px;
    }
    .corner-decoration {
      position: absolute;
      width: 150px;
      height: 150px;
      border: 2px solid rgba(99, 102, 241, 0.2);
      border-radius: 20px;
      z-index: 1;
    }
    .corner-decoration.top-right {
      top: 20px;
      right: 20px;
      border-left: none;
      border-bottom: none;
    }
    .corner-decoration.bottom-left {
      bottom: 20px;
      left: 20px;
      border-right: none;
      border-top: none;
    }
    .mute-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(99, 102, 241, 0.3);
      border: 2px solid rgba(99, 102, 241, 0.5);
      color: #a5b4fc;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s;
      font-weight: 700;
    }
    .mute-btn:hover {
      background: rgba(99, 102, 241, 0.5);
      border-color: #6366f1;
    }
  </style>
</head>
<body>
  <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 صوت</button>
  
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  
  <div class="corner-decoration top-right"></div>
  <div class="corner-decoration bottom-left"></div>
  
  <div class="container">
    <div class="shield-container">
      <div class="shield-bg"></div>
      <div class="shield-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#gradient1)" stroke-width="1.5">
          <defs>
            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#a5b4fc"/>
              <stop offset="50%" style="stop-color:#6366f1"/>
              <stop offset="100%" style="stop-color:#10b981"/>
            </linearGradient>
          </defs>
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    
    <h1>حارس الأمان الرقمي</h1>
    <p class="subtitle">
      مرحباً بك في رحلة تعليمية مشوّقة<br>
      ستتعلم كيف تحمي نفسك في العالم الرقمي
    </p>
    
    <div class="badge" onclick="startJourney()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span>ابدأ الرحلة</span>
    </div>
  </div>
  <script>
    class AudioManager {
      constructor() {
        this.isMuted = false;
        this.audioContext = null;
      }

      playButtonClick() {
        this.playTone(800, 0.1, 0.1);
      }

      playPageTransition() {
        this.playTone(600, 0.1, 0.05);
        setTimeout(() => this.playTone(700, 0.1, 0.05), 80);
      }

      playTone(frequency, volume, duration) {
        if (this.isMuted) return;

        try {
          if (!this.audioContext) {
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
          }

          const oscillator = this.audioContext.createOscillator();
          const gainNode = this.audioContext.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(this.audioContext.destination);

          oscillator.frequency.value = frequency;
          oscillator.type = 'sine';

          gainNode.gain.setValueAtTime(volume, this.audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);

          oscillator.start(this.audioContext.currentTime);
          oscillator.stop(this.audioContext.currentTime + duration);
        } catch (e) {
          console.log('الصوت غير متاح');
        }
      }

      toggleMute() {
        this.isMuted = !this.isMuted;
        return this.isMuted;
      }
    }

    const audioManager = new AudioManager();

    function toggleMute() {
      const isMuted = audioManager.toggleMute();
      const btn = document.getElementById('muteBtn');
      btn.textContent = isMuted ? '🔇 صامت' : '🔊 صوت';
      audioManager.playButtonClick();
    }

    function startJourney() {
      audioManager.playPageTransition();
      setTimeout(() => {
        window.location.href = 'slide-02-what-is-cybersecurity.html';
      }, 200);
    }
  </script>
</body>
</html>
