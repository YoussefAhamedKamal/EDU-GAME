<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 25px;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .glow-1, .glow-2 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
    }
    .glow-1 {
      width: 300px; height: 300px;
      background: rgba(99, 102, 241, 0.25);
      top: -100px; right: -50px;
    }
    .glow-2 {
      width: 250px; height: 250px;
      background: rgba(16, 185, 129, 0.2);
      bottom: -80px; left: -50px;
    }
    .container {
      max-width: 750px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .icon-box {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
      position: relative;
    }
    .icon-box::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 22px;
      background: linear-gradient(135deg, #6366f1, #10b981);
      z-index: -1;
      opacity: 0.5;
    }
    .icon-box svg {
      width: 45px;
      height: 45px;
      stroke: white;
    }
    .header-text h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #e0e7ff;
      margin-bottom: 5px;
    }
    /* .slide-number {
      font-size: 0.9rem;
      color: #6366f1;
      font-weight: 600;
    } */
    .content-card {
      background: linear-gradient(145deg, rgba(30, 27, 75, 0.8), rgba(15, 23, 42, 0.9));
      border-radius: 24px;
      padding: 35px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }
    .definition {
      font-size: 1.15rem;
      line-height: 2;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 16px;
      border-right: 4px solid #6366f1;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }
    .feature {
      background: linear-gradient(145deg, rgba(99, 102, 241, 0.1), rgba(99, 102, 241, 0.05));
      border-radius: 16px;
      padding: 25px 15px;
      text-align: center;
      border: 1px solid rgba(99, 102, 241, 0.15);
      transition: all 0.3s ease;
    }
    .feature:hover {
      transform: translateY(-5px);
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
    }
    .feature-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #4f46e5, #10b981);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .feature-icon svg {
      width: 26px;
      height: 26px;
      stroke: white;
    }
    .feature span {
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  
  <div class="container">
    <div class="header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
      </div>
      <div class="header-text">
        <!-- <div class="slide-number">الشريحة 2 من 12</div> -->
        <h1>ما هو الأمن السيبراني؟</h1>
      </div>
    </div>
    
    <div class="content-card">
      <div class="definition">
        الأمن السيبراني هو مجموعة من الممارسات والتقنيات المصممة لحماية الأنظمة والشبكات والبرامج والبيانات من الهجمات الرقمية والوصول غير المصرح به.
      </div>
      
      <div class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
          <span>حماية البيانات</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <span>الأمان الرقمي</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <span>حماية الخصوصية</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
