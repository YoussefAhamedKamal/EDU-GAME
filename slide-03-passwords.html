<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 25px;
      background: linear-gradient(160deg, #0c0c1d 0%, #1a1a3e 50%, #0f0f23 100%);
      position: relative;
      overflow: hidden;
    }
    /* Animated Circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(245, 158, 11, 0.1);
      animation: rotate 20s linear infinite;
    }
    .circle-1 { width: 400px; height: 400px; top: -200px; right: -200px; }
    .circle-2 { width: 300px; height: 300px; bottom: -150px; left: -150px; animation-direction: reverse; }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .glow {
      position: absolute;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }
    .container {
      max-width: 750px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }
    .icon-box {
      width: 75px;
      height: 75px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.35);
    }
    .icon-box svg {
      width: 40px;
      height: 40px;
      stroke: white;
    }
    .header-text h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #fef3c7;
    }
    .slide-number {
      font-size: 0.85rem;
      color: #f59e0b;
      font-weight: 600;
    }
    /* Content */
    .content-card {
      background: linear-gradient(145deg, rgba(26, 26, 62, 0.9), rgba(15, 15, 35, 0.95));
      border-radius: 24px;
      padding: 30px;
      border: 1px solid rgba(245, 158, 11, 0.2);
      backdrop-filter: blur(20px);
    }
    .intro-text {
      font-size: 1.1rem;
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 25px;
      text-align: center;
    }
    /* Password Tester */
    .password-tester {
      background: linear-gradient(145deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(245, 158, 11, 0.2);
      margin-bottom: 25px;
    }
    .tester-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .tester-label svg {
      width: 22px;
      height: 22px;
      stroke: #f59e0b;
    }
    .password-input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 2px solid rgba(245, 158, 11, 0.3);
      background: rgba(0, 0, 0, 0.4);
      color: white;
      font-size: 1.1rem;
      font-family: 'Tajawal', sans-serif;
      margin-bottom: 15px;
      transition: all 0.3s;
    }
    .password-input:focus {
      outline: none;
      border-color: #f59e0b;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
    }
    .password-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .strength-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 4px;
    }
    .strength-bar {
      height: 12px;
      background: transparent;
      border-radius: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: all 0.4s ease;
      border-radius: 8px;
      background: linear-gradient(90deg, #ef4444, #f59e0b);
    }
    .strength-text {
      margin-top: 12px;
      font-weight: 700;
      text-align: center;
      font-size: 1.1rem;
      transition: all 0.3s;
    }
    /* Tips Grid */
    .tips {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .tip {
      background: rgba(245, 158, 11, 0.08);
      padding: 15px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(245, 158, 11, 0.15);
      transition: all 0.3s;
    }
    .tip:hover {
      background: rgba(245, 158, 11, 0.15);
      transform: translateX(-3px);
    }
    .tip-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tip-icon svg {
      width: 20px;
      height: 20px;
      stroke: white;
    }
    .tip span {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="glow"></div>
  
  <div class="container">
    <div class="header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="slide-number">الشريحة 3 من 12</div>
        <h1>كلمات المرور القوية</h1>
      </div>
    </div>
    
    <div class="content-card">
      <p class="intro-text">
        كلمة المرور القوية هي خط الدفاع الأول لحماية حساباتك. جرّب اختبار قوة كلمة المرور!
      </p>
      
      <div class="password-tester">
        <div class="tester-label">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <span>اختبر قوة كلمة مرورك:</span>
        </div>
        <input type="text" class="password-input" id="passwordInput" placeholder="اكتب كلمة مرور للاختبار..." oninput="checkPassword()">
        <div class="strength-container">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
        </div>
        <div class="strength-text" id="strengthText" style="color: rgba(255,255,255,0.5);">أدخل كلمة مرور للاختبار</div>
      </div>
      
      <div class="tips">
        <div class="tip">
          <div class="tip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M9 12l2 2 4-4"/>
              <circle cx="12" cy="12" r="10"/>
            </svg>
          </div>
          <span>8 أحرف على الأقل</span>
        </div>
        <div class="tip">
          <div class="tip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M9 12l2 2 4-4"/>
              <circle cx="12" cy="12" r="10"/>
            </svg>
          </div>
          <span>أحرف كبيرة وصغيرة</span>
        </div>
        <div class="tip">
          <div class="tip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M9 12l2 2 4-4"/>
              <circle cx="12" cy="12" r="10"/>
            </svg>
          </div>
          <span>أرقام مختلفة</span>
        </div>
        <div class="tip">
          <div class="tip-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M9 12l2 2 4-4"/>
              <circle cx="12" cy="12" r="10"/>
            </svg>
          </div>
          <span>رموز خاصة (!@#$)</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById('passwordInput').value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      
      let strength = 0;
      if (password.length >= 8) strength += 25;
      if (/[A-Z]/.test(password)) strength += 25;
      if (/[0-9]/.test(password)) strength += 25;
      if (/[^A-Za-z0-9]/.test(password)) strength += 25;
      
      fill.style.width = strength + '%';
      
      if (strength === 0) {
        fill.style.background = 'linear-gradient(90deg, #6b7280, #9ca3af)';
        text.textContent = 'أدخل كلمة مرور للاختبار';
        text.style.color = 'rgba(255,255,255,0.5)';
      } else if (strength <= 25) {
        fill.style.background = 'linear-gradient(90deg, #ef4444, #f87171)';
        text.textContent = 'ضعيفة جداً - سهلة الاختراق!';
        text.style.color = '#f87171';
      } else if (strength <= 50) {
        fill.style.background = 'linear-gradient(90deg, #f59e0b, #fbbf24)';
        text.textContent = 'متوسطة - يمكن تحسينها';
        text.style.color = '#fbbf24';
      } else if (strength <= 75) {
        fill.style.background = 'linear-gradient(90deg, #84cc16, #a3e635)';
        text.textContent = 'جيدة - أضف المزيد!';
        text.style.color = '#a3e635';
      } else {
        fill.style.background = 'linear-gradient(90deg, #10b981, #34d399)';
        text.textContent = 'ممتازة - كلمة مرور قوية جداً!';
        text.style.color = '#34d399';
      }
    }
  </script>
</body>
</html>
