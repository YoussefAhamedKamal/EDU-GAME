<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 25px;
      background: linear-gradient(145deg, #052e16 0%, #14532d 50%, #022c22 100%);
      position: relative;
      overflow: hidden;
    }
    .circuit-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10h80v80H10z' fill='none' stroke='%2322c55e' stroke-opacity='0.05' stroke-width='1'/%3E%3Ccircle cx='10' cy='10' r='2' fill='%2322c55e' fill-opacity='0.1'/%3E%3Ccircle cx='90' cy='90' r='2' fill='%2322c55e' fill-opacity='0.1'/%3E%3C/svg%3E");
      background-size: 100px 100px;
    }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .container {
      max-width: 750px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }
    .icon-box {
      width: 75px;
      height: 75px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(34, 197, 94, 0.4);
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 10px 40px rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 10px 60px rgba(34, 197, 94, 0.6); }
    }
    .icon-box svg {
      width: 40px;
      height: 40px;
      stroke: white;
    }
    .header-text h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #bbf7d0;
    }
    .slide-number {
      font-size: 0.85rem;
      color: #4ade80;
      font-weight: 600;
    }
    .content-card {
      background: linear-gradient(145deg, rgba(20, 83, 45, 0.8), rgba(5, 46, 22, 0.9));
      border-radius: 24px;
      padding: 30px;
      border: 1px solid rgba(34, 197, 94, 0.2);
      backdrop-filter: blur(20px);
    }
    .intro-text {
      font-size: 1.1rem;
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 25px;
      text-align: center;
    }
    .update-demo {
      background: linear-gradient(145deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2));
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      text-align: center;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .device-container {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1f2937, #374151);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      border: 2px solid rgba(34, 197, 94, 0.3);
    }
    .device-container svg {
      width: 45px;
      height: 45px;
      stroke: #4ade80;
    }
    .update-message {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 20px;
    }
    .update-btn {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border: none;
      color: white;
      padding: 16px 45px;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 5px 25px rgba(34, 197, 94, 0.4);
    }
    .update-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(34, 197, 94, 0.5);
    }
    .update-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .update-btn svg {
      width: 22px;
      height: 22px;
      stroke: white;
    }
    .update-success {
      margin-top: 20px;
      padding: 15px 25px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #4ade80;
      font-weight: 600;
    }
    .update-success.show {
      display: flex;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .update-success svg {
      width: 24px;
      height: 24px;
      stroke: #4ade80;
    }
    .reasons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }
    .reason {
      background: linear-gradient(145deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
      padding: 20px 15px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(34, 197, 94, 0.15);
      transition: all 0.3s;
    }
    .reason:hover {
      transform: translateY(-5px);
      border-color: rgba(34, 197, 94, 0.4);
    }
    .reason-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .reason-icon svg {
      width: 26px;
      height: 26px;
      stroke: white;
    }
    .reason span {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="circuit-pattern"></div>
  <div class="glow"></div>
  
  <div class="container">
    <div class="header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="slide-number">الشريحة 7 من 12</div>
        <h1>التحديثات الأمنية</h1>
      </div>
    </div>
    
    <div class="content-card">
      <p class="intro-text">
        التحديثات ليست مزعجة! إنها تسد الثغرات الأمنية التي قد يستغلها المخترقون لاختراق جهازك.
      </p>
      
      <div class="update-demo">
        <div class="device-container">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </div>
        <p class="update-message">تحديث أمني جديد متاح لجهازك!</p>
        <button class="update-btn" id="updateBtn" onclick="simulateUpdate()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>تحديث الآن</span>
        </button>
        <div class="update-success" id="updateSuccess">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
            <polyline points="22,4 12,14.01 9,11.01"/>
          </svg>
          <span>تم التحديث بنجاح! جهازك محمي الآن</span>
        </div>
      </div>
      
      <div class="reasons">
        <div class="reason">
          <div class="reason-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <span>إصلاح الثغرات الأمنية</span>
        </div>
        <div class="reason">
          <div class="reason-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <polygon points="13,2 3,14 12,14 11,22 21,10 12,10 13,2"/>
            </svg>
          </div>
          <span>تحسين أداء الجهاز</span>
        </div>
        <div class="reason">
          <div class="reason-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26 12,2"/>
            </svg>
          </div>
          <span>إضافة ميزات جديدة</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function simulateUpdate() {
      const btn = document.getElementById('updateBtn');
      const success = document.getElementById('updateSuccess');
      
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="animation: spin 1s linear infinite;">
          <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
        </svg>
        <span>جارٍ التحديث...</span>
      `;
      btn.disabled = true;
      
      const style = document.createElement('style');
      style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
      document.head.appendChild(style);
      
      setTimeout(() => {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <polyline points="20,6 9,17 4,12"/>
          </svg>
          <span>تم التحديث</span>
        `;
        btn.style.background = 'linear-gradient(135deg, #059669, #10b981)';
        success.classList.add('show');
      }, 2500);
    }
  </script>
</body>
</html>
