<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 25px;
      background: linear-gradient(145deg, #083344 0%, #0e7490 50%, #064e3b 100%);
      position: relative;
      overflow: hidden;
    }
    .wave-bg {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(180deg, transparent, rgba(6, 182, 212, 0.1));
    }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
      top: -150px;
      left: -150px;
    }
    .container {
      max-width: 750px;
      width: 100%;
      position: relative;
      z-index: 10;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }
    .icon-box {
      width: 75px;
      height: 75px;
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(6, 182, 212, 0.4);
    }
    .icon-box svg {
      width: 40px;
      height: 40px;
      stroke: white;
    }
    .header-text h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #cffafe;
    }
    .slide-number {
      font-size: 0.85rem;
      color: #22d3ee;
      font-weight: 600;
    }
    .content-card {
      background: linear-gradient(145deg, rgba(14, 116, 144, 0.6), rgba(8, 51, 68, 0.9));
      border-radius: 24px;
      padding: 30px;
      border: 1px solid rgba(6, 182, 212, 0.2);
      backdrop-filter: blur(20px);
    }
    .intro-text {
      font-size: 1.1rem;
      line-height: 1.9;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 25px;
      text-align: center;
    }
    .phone-section {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .phone-mockup {
      width: 200px;
      flex-shrink: 0;
      background: linear-gradient(145deg, #1f2937, #111827);
      border-radius: 30px;
      padding: 12px;
      border: 3px solid #374151;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .phone-screen {
      background: linear-gradient(180deg, #0c4a6e, #0e7490);
      border-radius: 22px;
      padding: 15px;
      min-height: 280px;
    }
    .phone-header {
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 15px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .security-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .security-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
    }
    .security-item-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }
    .security-item-label svg {
      width: 20px;
      height: 20px;
      stroke: #22d3ee;
    }
    .toggle {
      width: 44px;
      height: 24px;
      background: #22c55e;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
    }
    .toggle::after {
      content: '';
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      right: 2px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    .tips-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tip-item {
      padding: 18px;
      background: linear-gradient(145deg, rgba(6, 182, 212, 0.1), rgba(6, 182, 212, 0.05));
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid rgba(6, 182, 212, 0.15);
      transition: all 0.3s;
    }
    .tip-item:hover {
      transform: translateX(-5px);
      border-color: rgba(6, 182, 212, 0.4);
    }
    .tip-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tip-icon svg {
      width: 22px;
      height: 22px;
      stroke: white;
    }
    .tip-item span {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="wave-bg"></div>
  <div class="glow"></div>
  
  <div class="container">
    <div class="header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
          <rect x="5" y="2" width="14" height="20" rx="2"/>
          <line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="slide-number">الشريحة 9 من 12</div>
        <h1>أمان الهاتف الذكي</h1>
      </div>
    </div>
    
    <div class="content-card">
      <p class="intro-text">
        هاتفك يحتوي على كنز من المعلومات الشخصية. احمِه كما تحمي أغلى ممتلكاتك!
      </p>
      
      <div class="phone-section">
        <div class="phone-mockup">
          <div class="phone-screen">
            <div class="phone-header">إعدادات الأمان</div>
            <div class="security-items">
              <div class="security-item">
                <div class="security-item-label">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                  </svg>
                  <span>قفل الشاشة</span>
                </div>
                <div class="toggle"></div>
              </div>
              <div class="security-item">
                <div class="security-item-label">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839-1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/>
                  </svg>
                  <span>البصمة</span>
                </div>
                <div class="toggle"></div>
              </div>
              <div class="security-item">
                <div class="security-item-label">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                  <span>الموقع</span>
                </div>
                <div class="toggle"></div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="tips-list">
          <div class="tip-item">
            <div class="tip-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <polyline points="20,6 9,17 4,12"/>
              </svg>
            </div>
            <span>استخدم رمز PIN قوي أو البصمة</span>
          </div>
          <div class="tip-item">
            <div class="tip-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <polyline points="20,6 9,17 4,12"/>
              </svg>
            </div>
            <span>حمّل التطبيقات من المتجر الرسمي فقط</span>
          </div>
          <div class="tip-item">
            <div class="tip-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <polyline points="20,6 9,17 4,12"/>
              </svg>
            </div>
            <span>راجع صلاحيات التطبيقات بانتظام</span>
          </div>
          <div class="tip-item">
            <div class="tip-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                <polyline points="20,6 9,17 4,12"/>
              </svg>
            </div>
            <span>فعّل خاصية "Find My Phone"</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
